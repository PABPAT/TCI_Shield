name: Deploy to HuggingFace Spaces

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/huggingface_deploy
          chmod 600 ~/.ssh/huggingface_deploy
          ssh-keyscan hf.co >> ~/.ssh/known_hosts
          ssh-add ~/.ssh/huggingface_deploy

      - name: Push to HuggingFace Space
        run: |
          git config --global user.email "deploy@github-actions.com"
          git config --global user.name "GitHub Actions"
          git remote add huggingface git@hf.co:spaces/PABPAT/TCI_Shield
          git push huggingface main --force